# =============================================================================
#  [04] Build Docker Image — Release 바이너리로 Docker 이미지 빌드
#
#  마지막 Release의 바이너리를 다운로드하여 Docker 이미지를 생성합니다.
#  Go 빌드를 수행하지 않습니다.
# =============================================================================

name: "[04] Build Docker Image"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "대상 릴리즈 버전 (비우면 최신 릴리즈 사용, 예: 0.9.0-202606.1)"
        required: false
        type: string
      push_ghcr:
        description: "GHCR (ghcr.io) 에 Push"
        required: false
        type: boolean
        default: true
      push_oci:
        description: "OCI Registry 에 Push"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    env:
      OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            # 최신 릴리즈 태그 가져오기
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName')
            VERSION=$(echo "$TAG" | sed 's/^v//')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Target release: ${TAG}"

      - name: Download release binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "Downloading binary from release ${TAG}..."
          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "muhan-server-linux-amd64" \
            --dir .
          chmod +x muhan-server-linux-amd64
          ./muhan-server-linux-amd64 -version || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── GHCR 로그인 ───
      - name: Login to GHCR
        if: inputs.push_ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── OCI Registry 로그인 ───
      - name: Login to OCI Registry
        if: inputs.push_oci && env.OCI_REGISTRY != ''
        uses: docker/login-action@v3
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_REGISTRY_USER }}
          password: ${{ secrets.OCI_REGISTRY_PASSWORD }}

      - name: Compute tags
        id: tags
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAGS=""

          # GHCR tags
          if [ "${{ inputs.push_ghcr }}" = "true" ]; then
            GHCR_IMAGE="ghcr.io/${{ github.repository }}"
            TAGS="${GHCR_IMAGE}:v${VERSION}"
            TAGS="${TAGS},${GHCR_IMAGE}:latest"
          fi

          # OCI tags
          if [ "${{ inputs.push_oci }}" = "true" ] && [ -n "$OCI_REGISTRY" ]; then
            OCI_IMAGE="${OCI_REGISTRY}/muhan"
            [ -n "$TAGS" ] && TAGS="${TAGS},"
            TAGS="${TAGS}${OCI_IMAGE}:v${VERSION}"
            TAGS="${TAGS},${OCI_IMAGE}:latest"
          fi

          PUSH="false"
          [ -n "$TAGS" ] && PUSH="true"

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "push=${PUSH}" >> "$GITHUB_OUTPUT"
          echo "Tags: ${TAGS}"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.release
          push: ${{ steps.tags.outputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BINARY=muhan-server-linux-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job Summary
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## 🐳 Docker Image Build"
            echo ""
            echo "| | 값 |"
            echo "|---|---|"
            echo "| **릴리즈 버전** | \`v${VERSION}\` |"
            echo "| **릴리즈 소스** | [v${VERSION}](https://github.com/${{ github.repository }}/releases/tag/v${VERSION}) |"
            echo "| **Dockerfile** | \`docker/Dockerfile.release\` |"
            echo ""
            echo "### 이미지 태그"
            echo ""
            echo "| Registry | 이미지 | Push |"
            echo "|----------|--------|------|"

            if [ "${{ inputs.push_ghcr }}" = "true" ]; then
              echo "| GHCR | \`ghcr.io/${{ github.repository }}:v${VERSION}\` | ✅ |"
              echo "| GHCR | \`ghcr.io/${{ github.repository }}:latest\` | ✅ |"
            else
              echo "| GHCR | — | ⏭ 스킵 |"
            fi

            if [ "${{ inputs.push_oci }}" = "true" ] && [ -n "$OCI_REGISTRY" ]; then
              echo "| OCI | \`${OCI_REGISTRY}/muhan:v${VERSION}\` | ✅ |"
              echo "| OCI | \`${OCI_REGISTRY}/muhan:latest\` | ✅ |"
            else
              echo "| OCI | — | ⏭ 스킵 |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
