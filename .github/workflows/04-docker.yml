# =============================================================================
#  [04] Build Docker Image — Release 바이너리로 Docker 이미지 빌드
#
#  마지막 Release의 바이너리를 다운로드하여 Docker 이미지를 생성합니다.
#  Go 빌드를 수행하지 않습니다.
# =============================================================================

name: "[04] Build Docker Image"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "대상 릴리즈 버전 (비우면 최신 릴리즈 사용, 예: 0.9.0-202606.1)"
        required: false
        type: string
      push_ghcr:
        description: "GHCR (ghcr.io) 에 Push"
        required: false
        type: boolean
        default: true
      push_oci:
        description: "OCI Registry 에 Push"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    env:
      OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            # 최신 릴리즈 태그 가져오기
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName')
            VERSION=$(echo "$TAG" | sed 's/^v//')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Target release: ${TAG}"

      - name: Download release binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "Downloading binary from release ${TAG}..."
          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "muhan-server-linux-amd64" \
            --dir .
          chmod +x muhan-server-linux-amd64
          ./muhan-server-linux-amd64 -version || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── GHCR 로그인 ───
      - name: Login to GHCR
        if: inputs.push_ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── OCI Registry Host 파싱 ───
      - name: Parse OCI Registry Host
        id: oci_host
        if: inputs.push_oci && env.OCI_REGISTRY != ''
        run: |
          # Extract only the domain/host from OCI_REGISTRY (e.g., icn.ocir.io/cnywk2t2q7tb -> icn.ocir.io)
          HOST=$(echo "${{ secrets.OCI_REGISTRY }}" | cut -d'/' -f1)
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"
          echo "Parsed host: ${HOST}"

      # ─── OCI Registry 로그인 ───
      - name: Login to OCI Registry
        id: oci_login
        if: inputs.push_oci && env.OCI_REGISTRY != ''
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.oci_host.outputs.host }}
          username: ${{ secrets.OCI_REGISTRY_USER }}
          password: ${{ secrets.OCI_REGISTRY_PASSWORD }}

      # ─── Build & Push to GHCR ───
      - name: Build & Push to GHCR
        id: ghcr_push
        if: inputs.push_ghcr
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.release
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:v${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            BINARY=muhan-server-linux-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Build & Push to OCI Registry ───
      - name: Build & Push to OCI Registry
        id: oci_push
        if: inputs.push_oci && env.OCI_REGISTRY != '' && steps.oci_login.outcome == 'success'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.release
          push: true
          tags: |
            ${{ env.OCI_REGISTRY }}/muhan:v${{ steps.version.outputs.version }}
            ${{ env.OCI_REGISTRY }}/muhan:latest
          build-args: |
            BINARY=muhan-server-linux-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job Summary
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## 🐳 Docker Image Build"
            echo ""
            echo "| | 값 |"
            echo "|---|---|"
            echo "| **릴리즈 버전** | \`v${VERSION}\` |"
            echo "| **릴리즈 소스** | [v${VERSION}](https://github.com/${{ github.repository }}/releases/tag/v${VERSION}) |"
            echo "| **Dockerfile** | \`docker/Dockerfile.release\` |"
            echo ""
            echo "### 이미지 태그"
            echo ""
            echo "| Registry | 이미지 | Push |"
            echo "|----------|--------|------|"

            if [ "${{ inputs.push_ghcr }}" = "true" ]; then
              if [ "${{ steps.ghcr_push.outcome }}" = "success" ]; then
                echo "| GHCR | \`ghcr.io/${{ github.repository }}:v${VERSION}\` | ✅ 성공 |"
                echo "| GHCR | \`ghcr.io/${{ github.repository }}:latest\` | ✅ 성공 |"
              else
                echo "| GHCR | \`ghcr.io/${{ github.repository }}:v${VERSION}\` | ❌ 실패 |"
              fi
            else
              echo "| GHCR | — | ⏭ 스킵 |"
            fi

            if [ "${{ inputs.push_oci }}" = "true" ] && [ -n "$OCI_REGISTRY" ]; then
              if [ "${{ steps.oci_login.outcome }}" != "success" ]; then
                echo "| OCI | \`${OCI_REGISTRY}/muhan:v${VERSION}\` | ❌ 로그인 실패 (Push 건너뜀) |"
              elif [ "${{ steps.oci_push.outcome }}" = "success" ]; then
                echo "| OCI | \`${OCI_REGISTRY}/muhan:v${VERSION}\` | ✅ 성공 |"
                echo "| OCI | \`${OCI_REGISTRY}/muhan:latest\` | ✅ 성공 |"
              else
                echo "| OCI | \`${OCI_REGISTRY}/muhan:v${VERSION}\` | ❌ Push 실패 (권한 없음 등) |"
              fi
            else
              echo "| OCI | — | ⏭ 스킵 |"
            fi

            echo ""
            echo "### 🚀 Pull & Run 가이드"
            echo ""
            if [ "${{ inputs.push_ghcr }}" = "true" ] && [ "${{ steps.ghcr_push.outcome }}" = "success" ]; then
              echo "#### 1. GHCR 이미지 사용"
              echo "\`\`\`bash"
              echo "# 이미지 다운로드"
              echo "docker pull ghcr.io/${{ github.repository }}:v${VERSION}"
              echo ""
              echo "# 컨테이너 실행 (볼륨 마운트 및 포트 바인딩)"
              echo "docker run -d \\"
              echo "  --name muhan-server \\"
              echo "  -p 4000:4000 \\"
              echo "  -p 4041:4041 \\"
              echo "  -v ./data:/data \\"
              echo "  ghcr.io/${{ github.repository }}:v${VERSION}"
              echo "\`\`\`"
              echo ""
            fi

            if [ "${{ inputs.push_oci }}" = "true" ] && [ -n "$OCI_REGISTRY" ] && [ "${{ steps.oci_push.outcome }}" = "success" ]; then
              echo "#### 2. OCI Registry 이미지 사용"
              echo "\`\`\`bash"
              echo "# 이미지 다운로드"
              echo "docker pull ${OCI_REGISTRY}/muhan:v${VERSION}"
              echo ""
              echo "# 컨테이너 실행 (볼륨 마운트 및 포트 바인딩)"
              echo "docker run -d \\"
              echo "  --name muhan-server \\"
              echo "  -p 4000:4000 \\"
              echo "  -p 4041:4041 \\"
              echo "  -v ./data:/data \\"
              echo "  ${OCI_REGISTRY}/muhan:v${VERSION}"
              echo "\`\`\`"
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"
