name: Close CI Issues

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  close-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Close remaining open CI issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          for ISSUE_NUM in 1 2 3; do
            # Check if issue is still open
            STATE=$(gh issue view "${ISSUE_NUM}" --json state -q '.state' 2>/dev/null || echo "UNKNOWN")
            if [ "$STATE" = "OPEN" ]; then
              echo "=== Issue #${ISSUE_NUM} is OPEN, closing ==="
              # Try gh issue close first
              gh issue close "${ISSUE_NUM}" --comment "Closed: CI pipeline fully passing." 2>/dev/null && echo "Closed #${ISSUE_NUM}" || {
                # Fallback: use REST API to close
                echo "gh close failed, using REST API fallback..."
                gh api "repos/${GH_REPO}/issues/${ISSUE_NUM}" \
                  -X PATCH \
                  -f state=closed \
                  -f state_reason=completed \
                  --silent && echo "Closed #${ISSUE_NUM} via REST API" || echo "Failed to close #${ISSUE_NUM}"
              }
            else
              echo "=== Issue #${ISSUE_NUM} is ${STATE}, skipping ==="
            fi
          done
