# =============================================================================
#  Muhan MUD - CI/CD Pipeline
#
#  트리거:
#    - main 브랜치로 push
#    - main 브랜치 대상 pull_request
#    - 수동 트리거 (workflow_dispatch)
#
#  Jobs:
#    1. lint   - go vet 정적 분석
#    2. test   - 유닛 테스트 (timeout 300s)
#    3. build  - 바이너리 빌드 검증
#    4. docker - Docker 이미지 빌드 및 레지스트리 푸시
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  GO_VERSION: "1.25.0"

jobs:
  # ──────────────────────────────────────────────────────────
  # 정적 분석 (go vet)
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run go vet
        run: go vet ./...

  # ──────────────────────────────────────────────────────────
  # 테스트
  # ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: |
          go test ./... -timeout 300s -v > test.log 2>&1 || (cat test.log && exit 1)

      - name: Create Issue on Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '```' > body.txt
          echo '=== FIRST 200 LINES ===' >> body.txt
          head -n 200 test.log >> body.txt
          echo '=== FAIL AND PANIC LINES ===' >> body.txt
          grep -E "FAIL|panic" test.log >> body.txt
          echo '=== LAST 100 LINES ===' >> body.txt
          tail -n 100 test.log >> body.txt
          echo '```' >> body.txt
          gh issue create --title "CI Test Failure Log" --body-file body.txt || true

  # ──────────────────────────────────────────────────────────
  # 빌드 검증
  # ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build server binary
        run: go build ./cmd/muhan-server/

  # ──────────────────────────────────────────────────────────
  # Docker 이미지 빌드 및 레지스트리 푸시 (main push 시에만)
  #
  # 두 레지스트리에 동시 푸시:
  #   1. GHCR (ghcr.io) — GitHub Container Registry
  #   2. OCI  (a2.oci.0xc0de1ab.dev) — 자체 OCI Registry
  # ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}, SHA: ${SHORT_SHA}, Date: ${BUILD_DATE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── GHCR 로그인 ───
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── OCI Registry 로그인 ───
      - name: Login to OCI Registry
        uses: docker/login-action@v3
        with:
          registry: a2.oci.0xc0de1ab.dev
          username: ${{ secrets.OCI_REGISTRY_USER }}
          password: ${{ secrets.OCI_REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            a2.oci.0xc0de1ab.dev/muhan
          tags: |
            type=raw,value=v${{ steps.version.outputs.version }}
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.short_sha }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
